# .github/workflows/manual-build.yml

name: Manual Build

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: '构建配置'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug
      create_release:
        description: '是否创建 Release'
        required: true
        default: false
        type: boolean
      release_tag:
        description: 'Release 标签 (留空则自动使用日期时间)'
        required: false
        type: string
      prerelease:
        description: '标记为预发布版本'
        required: false
        default: false
        type: boolean

# 防止并发运行，取消之前的运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '8.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.vars.outputs.version }}
      artifact_name: ${{ steps.vars.outputs.artifact_name }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set variables
      id: vars
      shell: bash
      run: |
        # 版本号
        if [ -n "${{ inputs.release_tag }}" ]; then
          version="${{ inputs.release_tag }}"
        else
          version=$(TZ='Asia/Shanghai' date '+%Y%m%d-%H%M%S')
        fi
        echo "version=$version" >> $GITHUB_OUTPUT
        
        # Artifact 名称
        config="${{ inputs.configuration || 'Release' }}"
        echo "artifact_name=HsMod-${config}-${version}" >> $GITHUB_OUTPUT
        
        # 输出信息
        echo "::notice::Version: $version"
        echo "::notice::Configuration: $config"

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore

    - name: Build HsMod
      run: |
        dotnet build --configuration ${{ inputs.configuration || 'Release' }} --no-restore /p:Version=${{ steps.vars.outputs.version }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.vars.outputs.artifact_name }}
        path: ./HsMod/Release/HsMod.dll
        retention-days: 30
        if-no-files-found: error
        compression-level: 9

  release:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ inputs.create_release == true }}
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        sparse-checkout: |
          CHANGELOG.md
          README.md
        sparse-checkout-cone-mode: false

    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ needs.build.outputs.artifact_name }}
        path: ./artifacts

    - name: Prepare release files
      run: |
        cd artifacts
        # 计算校验和
        sha256sum HsMod.dll > SHA256SUMS.txt
        echo "SHA256 Checksum:"
        cat SHA256SUMS.txt

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.build.outputs.version }}
        name: HsMod ${{ needs.build.outputs.version }}
        body: |
          ## HsMod ${{ needs.build.outputs.version }}
          
          ### 📦 构建信息
          | 项目 | 值 |
          |------|-----|
          | 构建配置 | `${{ inputs.configuration || 'Release' }}` |
          | .NET 版本 | `${{ env.DOTNET_VERSION }}` |
          | 提交 | [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) |
          | 构建时间 | ${{ needs.build.outputs.version }} |
          | 触发者 | @${{ github.actor }} |
          
          ### 📥 下载
          下载 `HsMod.dll` 文件，校验和见 `SHA256SUMS.txt`。
          
          ### ⚠️ 注意事项
          - 请确保游戏版本与 Mod 版本兼容
          - 建议备份原文件后再替换
        files: |
          ./artifacts/HsMod.dll
          ./artifacts/SHA256SUMS.txt
        draft: false
        prerelease: ${{ inputs.prerelease }}
        generate_release_notes: true
        fail_on_unmatched_files: true
        make_latest: ${{ inputs.prerelease == false }}

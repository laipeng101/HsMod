# .github/workflows/manual-build.yml

name: Manual Build

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: '构建配置'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug
      create_release:
        description: '是否创建 Release'
        required: true
        default: false
        type: boolean
      release_tag:
        description: 'Release 标签 (例如: v1.0.0)'
        required: false
        type: string

# 防止并发运行，取消之前的运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '8.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get version
      id: version
      shell: pwsh
      run: |
        if ("${{ inputs.release_tag }}" -ne "") {
          $version = "${{ inputs.release_tag }}"
        } else {
          $version = "v$(Get-Date -Format 'yyyy.MM.dd')-${{ github.run_number }}"
        }
        echo "version=$version" >> $env:GITHUB_OUTPUT
        echo "Version: $version"

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ${{ env.NUGET_PACKAGES }}
        key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}
        restore-keys: |
          nuget-${{ runner.os }}-

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore --locked-mode

    - name: Build HsMod
      run: dotnet build --configuration ${{ inputs.configuration || 'Release' }} --no-restore

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: HsMod-dll-${{ inputs.configuration || 'Release' }}
        path: ./HsMod/Release/HsMod.dll
        retention-days: 30
        if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ inputs.create_release == true }}
    permissions:
      contents: write

    steps:
    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: HsMod-dll-${{ inputs.configuration || 'Release' }}
        path: ./artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.build.outputs.version }}
        name: HsMod ${{ needs.build.outputs.version }}
        body: |
          ## HsMod ${{ needs.build.outputs.version }}
          
          ### 构建信息
          - 构建配置: ${{ inputs.configuration || 'Release' }}
          - 构建时间: ${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
          - 提交: ${{ github.sha }}
          
          ### 下载
          下载下方的 `HsMod.dll` 文件即可使用。
        files: ./artifacts/HsMod.dll
        draft: false
        prerelease: false
        generate_release_notes: true
